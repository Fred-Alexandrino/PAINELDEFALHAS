<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gerencial de Falhas - O&M</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        :root {
            --bg-dark: #0a0e17; 
            --bg-card: #131b2f; 
            --primary-accent: #00e5ff; 
            --secondary-accent: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --border-color: #2d3748;
            
            --status-open-bg: rgba(255, 68, 68, 0.2);
            --status-open-text: #ff4444;
            --status-wip-bg: rgba(255, 187, 51, 0.2);
            --status-wip-text: #ffbb33;
            --status-done-bg: rgba(0, 200, 81, 0.2);
            --status-done-text: #00c851;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
            background-image: linear-gradient(135deg, #0a0e17 0%, #111a2e 100%);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: var(--bg-card);
            border-radius: 12px;
            border-left: 5px solid var(--primary-accent);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo-img {
            height: 40px;
            object-fit: contain;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-muted);
            border-left: 2px solid var(--border-color);
            padding-left: 20px;
        }

        .btn-refresh {
            background-color: transparent;
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            background-color: var(--primary-accent);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--border-color);
        }

        .kpi-card:nth-child(1)::before { background-color: var(--primary-accent); }
        .kpi-card:nth-child(2)::before { background-color: var(--status-open-text); }
        .kpi-card:nth-child(3)::before { background-color: var(--status-wip-text); }
        .kpi-card:nth-child(4)::before { background-color: var(--status-done-text); }

        .kpi-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
        }

        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            padding: 10px 15px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary-accent);
        }

        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(0,0,0,0.2);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        td {
            font-size: 14px;
            color: #cbd5e1;
            vertical-align: top;
        }
        
        td strong {
            color: var(--text-main);
            font-size: 15px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .status-aberto { background: var(--status-open-bg); color: var(--status-open-text); border: 1px solid var(--status-open-text); }
        .status-andamento { background: var(--status-wip-bg); color: var(--status-wip-text); border: 1px solid var(--status-wip-text); }
        .status-resolvido { background: var(--status-done-bg); color: var(--status-done-text); border: 1px solid var(--status-done-text); }

        .hist-cell {
            min-width: 250px;
            white-space: pre-wrap;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .causa-cell {
            font-size: 13px;
            color: #94a3b8;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px;
            font-weight: bold;
            color: var(--primary-accent);
            font-size: 18px;
            letter-spacing: 1px;
        }
        
        .signature-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .signature-text {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .signature-text span {
            color: var(--primary-accent);
            font-weight: 600;
        }
    </style>
</head>

                <option value="Em Andamento">Em Andamento</option>
                <option value="Resolvido">Resolvido</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Buscar Equipamento/Falha</label>
            <input type="text" id="filter-text" placeholder="Digite para buscar..." onkeyup="applyFilters()">
        </div>
    </div>

    <div id="loader" class="loader">SINCRONIZANDO DADOS DA PLANILHA...</div>

    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usina</th>
                    <th>Falha Detectada</th>
                    <th>Causa da Falha</th>
                    <th>Equipamentos Impactados</th>
                    <th>Ação Imediata</th>
                    <th>Status</th>
                    <th>Histórico de Atualizações</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </div>
    
    <div class="signature-container">
        <div class="signature-text">
            GERADO POR <span>FRED ALEXANDRINO</span> // GRID O&M
        </div>
    </div>

    <script>
        let globalData = [];

        function fetchData() {
            document.getElementById('loader').style.display = 'block';
            
            const oldScript = document.getElementById('gviz-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'gviz-script';
            script.src = 'https://docs.google.com/spreadsheets/d/1VLo8__wxSJVWiUIFd_JTcOnadJlUt440i1M1pC0ehTs/gviz/tq?tqx=responseHandler:processData';
            script.onerror = function() {
                alert('Erro ao carregar dados. Confirme se o compartilhamento da planilha está configurado para "Qualquer pessoa com o link".');
                document.getElementById('loader').style.display = 'none';
            };
            document.head.appendChild(script);
        }

        function processData(response) {
            document.getElementById('loader').style.display = 'none';
            
            if (!response || response.status === 'error') {
                alert('Erro na API do Google Sheets.');
                return;
            }

            const rows = response.table.rows;
            globalData = [];

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!row.c || !row.c[0]) continue;
                
                let rowData = [];
                for (let j = 0; j < row.c.length; j++) {
                    const cell = row.c[j];
                    rowData.push(cell ? (cell.f ? cell.f : cell.v) : '');
                }
                globalData.push(rowData);
            }

            populateDropdowns();
            applyFilters();
        }

        function populateDropdowns() {
            const usinas = new Set();
            globalData.forEach(row => {
                if(row[2]) usinas.add(row[2]); 
            });

            const usinaSelect = document.getElementById('filter-usina');
            usinaSelect.innerHTML = '<option value="ALL">Todas as Usinas</option>';
            usinas.forEach(usina => {
                let opt = document.createElement('option');
                opt.value = usina;
                opt.textContent = usina;
                usinaSelect.appendChild(opt);
            });
        }

        function applyFilters() {
            const usinaFilter = document.getElementById('filter-usina').value;
            const statusFilter = document.getElementById('filter-status').value;
            const textFilter = document.getElementById('filter-text').value.toLowerCase();

            const filtered = globalData.filter(row => {
                const usina = row[2] || '';
                const status = row[7] || '';
                const rowText = row.join(' ').toLowerCase();

                const matchUsina = (usinaFilter === 'ALL' || usina === usinaFilter);
                const matchStatus = (statusFilter === 'ALL' || status === statusFilter);
                const matchText = (textFilter === '' || rowText.includes(textFilter));

                return matchUsina && matchStatus && matchText;
            });

            updateKPIs(filtered);
            renderTable(filtered);
        }

        function updateKPIs(data) {
            document.getElementById('kpi-total').textContent = data.length;
            
            let aberto = 0, andamento = 0, resolvido = 0;
            data.forEach(row => {
                const status = row[7] || '';
                if (status.toLowerCase().includes('aberto')) aberto++;
                else if (status.toLowerCase().includes('andamento')) andamento++;
                else if (status.toLowerCase().includes('resolvido')) resolvido++;
            });

            document.getElementById('kpi-aberto').textContent = aberto;
            document.getElementById('kpi-andamento').textContent = andamento;
            document.getElementById('kpi-resolvido').textContent = resolvido;
        }

        function getStatusClass(status) {
            if (!status) return '';
            const s = status.toLowerCase();
            if (s.includes('aberto')) return 'status-aberto';
            if (s.includes('andamento')) return 'status-andamento';
            if (s.includes('resolvido')) return 'status-resolvido';
            return '';
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');
                
                const id = row[0] || '-';
                const usina = row[2] || '-';
                const falha = `<strong>${row[3] || '-'}</strong>`;
                const causa = row[4] || '-';
                const equips = row[5] || '-';
                const acao = row[6] || '-';
                const status = row[7] || '-';
                const historico = row[8] || '-';

                tr.innerHTML = `
                    <td style="color:var(--primary-accent); font-weight:600;">${id}</td>
                    <td style="font-weight:600; color:var(--text-main);">${usina}</td>
                    <td>${falha}</td>
                    <td class="causa-cell">${causa}</td>
                    <td>${equips}</td>
                    <td>${acao}</td>
                    <td><span class="status-badge ${getStatusClass(status)}">${status}</span></td>
                    <td class="hist-cell">${historico}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
